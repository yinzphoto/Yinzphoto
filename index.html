<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yinzphoto | Professional Photography Pittsburgh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .split-side {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (min-width: 768px) {
            .split-side:hover { flex-grow: 1.2; }
        }
    </style>
</head>
<body class="bg-slate-900 flex flex-col h-screen overflow-hidden">

    <div class="absolute top-6 md:top-10 left-0 right-0 z-50 text-center pointer-events-none">
        <h1 class="text-white text-3xl md:text-5xl font-black tracking-tighter drop-shadow-2xl">
            <span style="color: #FFB612;">YINZ</span>PHOTO
        </h1>
        <p class="text-slate-300 tracking-widest text-[10px] md:text-xs mt-1 uppercase font-bold">Pittsburgh, PA</p>
    </div>

    <main class="flex flex-col md:flex-row flex-grow w-full">
        
        <a href="portraits.html" class="split-side relative flex-1 group overflow-hidden border-b md:border-b-0 md:border-r border-slate-800">
            <div class="absolute inset-0 bg-[url('portrait-hero.jpg')] bg-cover bg-center transition-transform duration-700 group-hover:scale-105"></div>
            <div class="absolute inset-0 bg-slate-900/50 md:bg-slate-900/40 group-hover:bg-slate-900/20 transition-colors"></div>
            
            <div class="relative h-full flex flex-col items-center justify-center text-center p-6 pt-20 md:pt-0">
                <h2 class="text-white text-2xl md:text-5xl font-bold mb-2">Portraits</h2>
                <div class="h-1 w-10 bg-[#FFB612] mb-4"></div>
                <p class="text-slate-200 text-sm md:text-base md:opacity-0 md:group-hover:opacity-100 transition-opacity duration-500 max-w-xs font-medium">
                    Corporate Headshots & Character Portraits.
                </p>
            </div>
        </a>

        <a href="real-estate.html" class="split-side relative flex-1 group overflow-hidden">
            <div class="absolute inset-0 bg-[url('re-hero.jpg')] bg-cover bg-center transition-transform duration-700 group-hover:scale-105"></div>
            <div class="absolute inset-0 bg-slate-900/50 md:bg-slate-900/40 group-hover:bg-slate-900/20 transition-colors"></div>
            
            <div class="relative h-full flex flex-col items-center justify-center text-center p-6 pb-20 md:pb-0">
                <h2 class="text-white text-2xl md:text-5xl font-bold mb-2">Real Estate</h2>
                <div class="h-1 w-10 bg-[#FFB612] mb-4"></div>
                <p class="text-slate-200 text-sm md:text-base md:opacity-0 md:group-hover:opacity-100 transition-opacity duration-500 max-w-xs font-medium">
                    High-End Property Media. MLS-Ready.
                </p>
            </div>
        </a>

    </main>

    <footer class="bg-slate-900 md:absolute md:bottom-6 left-0 right-0 z-50 text-center py-4 md:py-0">
        <p class="text-slate-400 text-[9px] uppercase tracking-widest font-bold">
            ESTABLISHED 2026 &nbsp;|&nbsp; PROFESSIONAL MEDIA SOLUTIONS
        </p>
    </footer>

</body>
</html>
